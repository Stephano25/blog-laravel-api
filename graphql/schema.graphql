# Déclaration unique du scalar DateTime
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

type User {
    id: ID!
    name: String!
    email: String!
    posts: [Post!]! @hasMany
    comments: [Comment!]! @hasMany
    created_at: DateTime!
    updated_at: DateTime!
}

type Post {
    id: ID!
    title: String!
    content: String!
    author: User! @belongsTo
    comments: [Comment!]! @hasMany
    published: Boolean!
    created_at: DateTime!
    updated_at: DateTime!
}

type Comment {
    id: ID!
    content: String!
    author: User! @belongsTo(relation: "author")
    post: Post! @belongsTo
    created_at: DateTime!
    updated_at: DateTime!
}

type AuthPayload {
    token: String!
    user: User!
}

input CreatePostInput {
    title: String!
    content: String!
    published: Boolean!
}

input UpdatePostInput {
    title: String
    content: String
    published: Boolean
}

type PostsResult {
    posts: [Post!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
}

type Query {
    users: [User!]! @all
    user(id: ID! @eq): User @find
    posts(page: Int = 1, limit: Int = 10): PostsResult! @field(resolver: "App\\GraphQL\\Queries\\PostsQuery")
    post(id: ID! @eq): Post @find
    me: User @auth
}

type Mutation {
    login(email: String!, password: String!): AuthPayload! @field(resolver: "App\\GraphQL\\Mutations\\LoginMutation")
    createPost(input: CreatePostInput!): Post! @create
    updatePost(id: ID!, input: UpdatePostInput!): Post! @update
    deletePost(id: ID!): Boolean! @delete
}